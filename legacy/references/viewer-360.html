<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>360 Viewer</title>
  <style>
    :root {
      --bg-0: #060a14;
      --bg-1: #0e1728;
      --line: #203255;
      --text: #f4f8ff;
      --muted: #a9b8d6;
      --accent: #47b5ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% -10%, rgba(71, 181, 255, 0.2), transparent 35%),
        linear-gradient(150deg, var(--bg-0), var(--bg-1));
    }

    body {
      display: grid;
      place-items: center;
      padding: clamp(12px, 2.5vw, 24px);
    }

    .viewer {
      width: min(100%, 980px);
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .stage {
      width: min(100%, 860px);
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #050910;
      position: relative;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    .stage.dragging {
      cursor: grabbing;
    }

    .stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
      user-select: none;
    }

    .hud {
      width: min(100%, 860px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: clamp(12px, 1.7vw, 14px);
    }

    .status {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .hint {
      text-align: right;
    }

    @media (max-width: 720px) {
      .stage {
        border-radius: 12px;
      }

      .hud {
        flex-direction: column;
        align-items: flex-start;
      }

      .hint {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="viewer">
    <section class="stage" id="stage" aria-label="360 degree image viewer">
      <img id="viewerImage" alt="360 frame">
    </section>
    <div class="hud">
      <p class="status" id="status">Loading frames...</p>
      <p class="hint">Click and drag left/right to control rotation.</p>
    </div>
  </main>

  <script>
    (function () {
      "use strict";

      const FRAME_COUNT = 240;
      const FRAME_RATE = 24;
      const FRAME_DURATION_MS = 1000 / FRAME_RATE;
      const DRAG_SENSITIVITY_PX = 3;
      const BASE_PATH_CANDIDATES = [
        "file:///C:/Users/KR%20PIX/Downloads/sites/Opera/images/Frame/",
        "../images/Frame/",
        "./images/Frame/"
      ];

      const stage = document.getElementById("stage");
      const viewerImage = document.getElementById("viewerImage");
      const status = document.getElementById("status");

      let currentFrame = 0;
      let autoDirection = 1;
      let autoplayRaf = 0;
      let isDragging = false;
      let lastPointerX = 0;
      let activeBasePath = BASE_PATH_CANDIDATES[0];
      let isReady = false;
      let lastTick = 0;
      let frameAccumulator = 0;

      function frameName(index) {
        return "frame" + String(index).padStart(3, "0") + ".webp";
      }

      function frameSrc(index) {
        return activeBasePath + frameName(index);
      }

      function wrapFrame(index) {
        return (index + FRAME_COUNT) % FRAME_COUNT;
      }

      function renderFrame(index) {
        currentFrame = wrapFrame(index);
        const nextSrc = frameSrc(currentFrame);
        if (viewerImage.src !== nextSrc) {
          viewerImage.src = nextSrc;
        }
        status.textContent = "Frame " + String(currentFrame + 1).padStart(3, "0") + " / " + FRAME_COUNT;
      }

      function stopAutoplay() {
        if (autoplayRaf) {
          cancelAnimationFrame(autoplayRaf);
          autoplayRaf = 0;
        }
        lastTick = 0;
        frameAccumulator = 0;
      }

      function tickAutoplay(timestamp) {
        if (!lastTick) {
          lastTick = timestamp;
        }

        const delta = timestamp - lastTick;
        lastTick = timestamp;

        if (!isDragging) {
          frameAccumulator += delta;
          while (frameAccumulator >= FRAME_DURATION_MS) {
            renderFrame(currentFrame + autoDirection);
            frameAccumulator -= FRAME_DURATION_MS;
          }
        }

        autoplayRaf = requestAnimationFrame(tickAutoplay);
      }

      function startAutoplay() {
        if (!isReady) return;
        stopAutoplay();
        autoplayRaf = requestAnimationFrame(tickAutoplay);
      }

      async function preloadFrames() {
        const chunkSize = 24;

        for (let i = 0; i < FRAME_COUNT; i += 1) {
          const chunkPromises = [];
          const chunkEnd = Math.min(i + chunkSize, FRAME_COUNT);

          for (let j = i; j < chunkEnd; j += 1) {
            chunkPromises.push(testImageSource(frameSrc(j)));
          }

          const results = await Promise.all(chunkPromises);
          if (results.some(ok => !ok)) return false;

          await new Promise(resolve => setTimeout(resolve, 0));
        }

        return true;
      }

      function setDynamicAspectRatio() {
        if (!viewerImage.naturalWidth || !viewerImage.naturalHeight) return;
        stage.style.aspectRatio = viewerImage.naturalWidth + " / " + viewerImage.naturalHeight;
      }

      function testImageSource(src) {
        return new Promise(function (resolve) {
          const probe = new Image();
          probe.onload = function () { resolve(true); };
          probe.onerror = function () { resolve(false); };
          probe.src = src;
        });
      }

      async function resolveBasePath() {
        for (let i = 0; i < BASE_PATH_CANDIDATES.length; i += 1) {
          const candidate = BASE_PATH_CANDIDATES[i];
          const ok = await testImageSource(candidate + "frame000.webp");
          if (ok) return candidate;
        }
        return null;
      }

      function onPointerDown(event) {
        if (!isReady) return;
        if (event.button !== undefined && event.button !== 0) return;
        isDragging = true;
        stage.classList.add("dragging");
        lastPointerX = event.clientX;
        stopAutoplay();
        if (stage.setPointerCapture) stage.setPointerCapture(event.pointerId);
      }

      function onPointerMove(event) {
        if (!isReady) return;
        if (!isDragging) return;
        const deltaX = event.clientX - lastPointerX;
        if (Math.abs(deltaX) < DRAG_SENSITIVITY_PX) return;

        const steps = Math.floor(Math.abs(deltaX) / DRAG_SENSITIVITY_PX);
        const direction = deltaX > 0 ? -1 : 1;
        autoDirection = direction;
        renderFrame(currentFrame + direction * steps);
        lastPointerX = event.clientX;
      }

      function endDrag(event) {
        if (!isReady) return;
        if (!isDragging) return;
        isDragging = false;
        stage.classList.remove("dragging");
        if (
          event &&
          typeof event.pointerId === "number" &&
          stage.releasePointerCapture &&
          stage.hasPointerCapture(event.pointerId)
        ) {
          stage.releasePointerCapture(event.pointerId);
        }
        startAutoplay();
      }

      async function init() {
        const resolvedPath = await resolveBasePath();
        if (!resolvedPath) {
          status.textContent = "Could not load frame000.webp from configured paths.";
          return;
        }

        activeBasePath = resolvedPath;
        viewerImage.src = frameSrc(0);
        viewerImage.addEventListener("load", setDynamicAspectRatio, { once: true });
        const loaded = await preloadFrames();
        if (!loaded) {
          status.textContent = "Could not preload all frames.";
          return;
        }
        isReady = true;
        renderFrame(0);
        startAutoplay();
      }

      stage.addEventListener("pointerdown", onPointerDown);
      stage.addEventListener("pointermove", onPointerMove);
      stage.addEventListener("pointerup", endDrag);
      stage.addEventListener("pointercancel", endDrag);
      stage.addEventListener("lostpointercapture", function () { endDrag(); });
      window.addEventListener("mouseup", endDrag);
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          stopAutoplay();
          return;
        }
        if (!isDragging && isReady) {
          startAutoplay();
        }
      });

      init();
    })();
  </script>
</body>
</html>
